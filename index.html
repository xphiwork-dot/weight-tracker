function z(n){return n<10?"0"+n:""+n}

function tick(){
var n=new Date();
document.getElementById("clk").textContent=z(n.getHours())+":"+z(n.getMinutes())+":"+z(n.getSeconds());
document.getElementById("clkd").textContent=THU[n.getDay()]+", "+n.getDate()+"/"+z(n.getMonth()+1)+"/"+n.getFullYear();

function gvd(){var d=new Date();d.setDate(d.getDate()+offset);return d}
function gdk(d){return d.getFullYear()+"-"+z(d.getMonth()+1)+"-"+z(d.getDate())}

// Load all data for a date range (7 days back, 7 days forward)
async function loadData() {
  const today = new Date();
  const promises = [];
  
  // Load weights
  promises.push(supabase.from('weights').select('*').order('date'));
  
  // Load eaten meals for a range of dates
  const dates = [];
  for (let i = -7; i <= 7; i++) {
    let d = new Date(today);
    d.setDate(d.getDate() + i);
    dates.push(gdk(d));
  }
  promises.push(supabase.from('eaten_meals').select('*').in('date', dates));
  promises.push(supabase.from('custom_meals').select('*').in('date', dates));
  promises.push(supabase.from('checklists').select('*').in('date', dates));
  promises.push(supabase.from('water_logs').select('*').in('date', dates));

  const [weightsRes, eatenRes, customRes, checklistRes, waterRes] = await Promise.all(promises);

  // Process weights
  if (weightsRes.data) {
    cache.weights = {};
    weightsRes.data.forEach(w => {
      cache.weights[w.date] = w.weight;
    });
  }

  // Process eaten meals
  cache.eatenMeals = {};
  if (eatenRes.data) {
    eatenRes.data.forEach(m => {
      if (!cache.eatenMeals[m.date]) cache.eatenMeals[m.date] = [];
      cache.eatenMeals[m.date].push(m.meal_index);
    });
  }

  // Process custom meals
  cache.customMeals = {};
  if (customRes.data) {
    customRes.data.forEach(m => {
      if (!cache.customMeals[m.date]) cache.customMeals[m.date] = [];
      cache.customMeals[m.date].push({n: m.name, c: m.calories});
    });
  }

  // Process checklists
  cache.checklists = {};
  if (checklistRes.data) {
    checklistRes.data.forEach(c => {
      if (!cache.checklists[c.date]) cache.checklists[c.date] = {};
      cache.checklists[c.date][c.item_index] = c.checked;
    });
  }

  // Process water
  cache.water = {};
  if (waterRes.data) {
    waterRes.data.forEach(w => {
      cache.water[w.date] = w.glasses;
    });
  }
}

function glw(){
  var keys = Object.keys(cache.weights).sort();
  if (keys.length === 0) return SW;
  return cache.weights[keys[keys.length - 1]];
}

function gcals(dk){
  return cache.eatenMeals[dk] || [];
}

function getCustomCals(dk){
  return cache.customMeals[dk] || [];
}

async function tgeat(i){
var dk=gdk(gvd());
var current = gcals(dk);
var idx = current.indexOf(i);
if(idx>=0){
  // Remove - delete from DB
  current.splice(idx, 1);
  await supabase.from('eaten_meals').delete().match({date: dk, meal_index: i});
} else {
  // Add - insert to DB
  current.push(i);
  await supabase.from('eaten_meals').insert({date: dk, meal_index: i});
}
cache.eatenMeals[dk] = current;
render();
}

async function addcust(){
var nm=document.getElementById("cfname").value.trim();
var cl=parseInt(document.getElementById("cfcal").value);
if(!nm){alert("Nh\u1EADp t\u00EAn m\u00F3n");return}
if(!cl||cl<1){alert("Nh\u1EADp s\u1ED1 calo");return}
var dk=gdk(gvd());
await supabase.from('custom_meals').insert({date: dk, name: nm, calories: cl});
if(!cache.customMeals[dk]) cache.customMeals[dk] = [];
cache.customMeals[dk].push({n:nm, c:cl});
render();
}

async function quickadd(name,cal){
var dk=gdk(gvd());
await supabase.from('custom_meals').insert({date: dk, name: name, calories: cal});
if(!cache.customMeals[dk]) cache.customMeals[dk] = [];
cache.customMeals[dk].push({n:name, c:cal});
render();
}

async function rmcust(i){
var dk=gdk(gvd());
var cust = cache.customMeals[dk];
if(cust && cust[i]){
  await supabase.from('custom_meals').delete().match({date: dk, name: cust[i].n});
  cust.splice(i, 1);
  render();
}
}

async function tck(i){
var dk=gdk(gvd());
if(!cache.checklists[dk]) cache.checklists[dk] = {};
var current = cache.checklists[dk][i] || false;
var newVal = !current;
await supabase.from('checklists').upsert({date: dk, item_index: i, checked: newVal}, {onConflict: 'date,item_index'});
cache.checklists[dk][i] = newVal;
render();
}

async function twt(i){
var dk=gdk(gvd());
var newVal = i + 1;
await supabase.from('water_logs').upsert({date: dk, glasses: newVal}, {onConflict: 'date'});
cache.water[dk] = newVal;
render();
}

async function svw(){
var el=document.getElementById("winp");var v=parseFloat(el.value);
if(!v||v<50||v>100){alert("Nh\u1EADp 50-100kg");return}
var dk=gdk(gvd());
await supabase.from('weights').upsert({date: dk, weight: v}, {onConflict: 'date'});
cache.weights[dk] = v;
el.value="";alert("\u0110\u00E3 l\u01B0u "+v+"kg ✅");render();
}

// Initial render
render();
